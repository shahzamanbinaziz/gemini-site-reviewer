on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Enter the Website URL to Review'
        required: true
        default: 'https://example.com'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests google-genai python-whois beautifulsoup4
      - name: Run Reviewer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_URL: ${{ github.event.inputs.site_url }} # This uses the input!
        run: python reviewer.py
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
